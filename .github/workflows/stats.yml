name: Update GitHub Stats
on:
  schedule:
    - cron: '0 */12 * * *' # Updates every 12 hours
  workflow_dispatch: # Allows manual trigger

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Generate Stats SVG
        run: |
          curl -s "https://github-stats-extended.vercel.app/api?username=mafaiziyas&show_icons=true&theme=dark" > github-stats.svg
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github-stats.svg
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update stats" && git push)
