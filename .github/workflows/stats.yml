name: Update GitHub Stats
on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:          # <--- Make sure these two lines are there!
      contents: write     # <---
    steps:
      - uses: actions/checkout@v4 # Upgraded to v4 to fix the node warning too!
      
      - name: Generate Stats SVG
        run: |
          curl -s "https://github-readme-stats-fast.vercel.app/api?username=mafaiziyas&show_icons=true&theme=dark&count_private=true" > github-stats.svg
          
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github-stats.svg
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update stats card" && git push)
